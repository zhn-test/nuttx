#
# Posts / updates a comment on a PR that declared cross-repo "depends-on:"
# dependencies (listing the linked PR(s) + CI run URL), or reports that the
# depends-on declaration could not be parsed.
#
# Runs via workflow_run AFTER the read-only "Build" workflow completes, because
# commenting needs write permissions not available to the fork-safe "Build"
# run.  It never checks out or executes any PR (fork) code; it only downloads
# the "depends-on-report" artifact as UNTRUSTED data and:
#   * validates the reported PR against the trusted workflow_run head_sha
#     (guards against commenting on someone else's PR); and
#   * re-validates the report schema / dependency values itself (guards against
#     bot-comment injection via a poisoned artifact on the author's own PR).
#
# NOTE: workflow_run only triggers from the copy of this file on the
# repository's DEFAULT branch.  To test on a fork, commit this file to the
# fork's default branch first.

name: Depends-On Comment

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

permissions:
  actions: read          # download an artifact from the triggering run
  # Commenting on a *pull request* requires pull-requests:write (issues:write
  # only covers comments on issues).  pull-requests:write also covers the read
  # needed for head_sha validation.
  pull-requests: write

# Allow-list used to independently validate the (untrusted) artifact.
# Keep in sync with build.yml (fork: zhn-test/*, upstream: apache/*).
env:
  NUTTX_REPO: zhn-test/nuttx
  APPS_REPO: zhn-test/nuttx-apps

jobs:
  comment:
    # Build also runs on push (release branches / tags); only comment for PRs.
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download depends-on report
        id: dl
        uses: actions/download-artifact@v8
        with:
          name: depends-on-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: report
        continue-on-error: true

      - name: Comment on the PR
        if: ${{ steps.dl.outcome == 'success' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const allow = [process.env.NUTTX_REPO, process.env.APPS_REPO].filter(Boolean);

            // --- read the (untrusted) report artifact ---
            let report;
            try {
              report = JSON.parse(fs.readFileSync('report/result.json', 'utf8'));
            } catch (e) {
              core.info('No valid depends-on report; nothing to comment.');
              return;
            }

            // --- re-validate the schema here; do NOT trust the Build-side
            // parser blindly (the artifact may be produced by fork code). ---
            if (report.version !== 1) {
              core.info('Unexpected report version; skipping.');
              return;
            }
            const status = report.status;
            if (status !== 'ok' && status !== 'invalid' && status !== 'failed' && status !== 'none') {
              core.info(`Report status='${status}'; nothing to comment.`);
              return;
            }

            // Independently validate each dependency (allow-list + safe int).
            // GitHub PR numbers are a per-repo sequential counter starting at 1
            // (shared with issues/discussions), with no documented upper bound.
            // Validate as a positive safe integer (upper bound is only JS float
            // safety, not a GitHub limit).
            const isSafeNumber = (n) => Number.isSafeInteger(n) && n > 0;
            const deps = (Array.isArray(report.dependencies) ? report.dependencies : [])
              .filter((d) => d && typeof d.repo === 'string'
                && allow.includes(d.repo) && isSafeNumber(d.number));

            // --- trust boundary: validate the reported PR number against the
            // workflow_run head_sha (set by GitHub, unforgeable by the PR). ---
            const headSha = context.payload.workflow_run.head_sha;
            const claimed = Number(report.pr_number);

            async function headMatches(prNum) {
              if (!Number.isSafeInteger(prNum) || prNum <= 0) return false;
              try {
                const { data: pr } = await github.rest.pulls.get({
                  owner, repo, pull_number: prNum });
                return pr.head.sha === headSha;
              } catch (e) {
                return false;
              }
            }

            let prNum = null;
            if (await headMatches(claimed)) {
              prNum = claimed;
            } else {
              const { data: assoc } =
                await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner, repo, commit_sha: headSha });
              const match = assoc.find((p) => p.number === claimed);
              if (match) prNum = match.number;
            }
            if (prNum === null) {
              core.setFailed(
                'Could not validate the target PR against workflow_run head_sha ' +
                '(possible artifact poisoning); skipping comment.');
              return;
            }

            // --- build the comment from validated / structured fields only ---
            const marker = '<!-- nuttx-depends-on-bot -->';
            const runUrl = context.payload.workflow_run.html_url;
            // depends-on removed (or never declared): clear any stale bot
            // comment so it doesn't linger as misleading information.
            if (status === 'none') {
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number: prNum });
              const stale = comments.find((c) => c.body && c.body.includes(marker));
              if (stale) {
                await github.rest.issues.deleteComment({
                  owner, repo, comment_id: stale.id });
                core.info(`Removed stale depends-on comment on PR #${prNum}.`);
              } else {
                core.info('No depends-on and no existing comment; nothing to do.');
              }
              return;
            }

            let body;
            if (status === 'ok') {
              if (deps.length === 0) {
                core.info('status=ok but no valid dependencies after validation; skipping.');
                return;
              }
              const list = deps
                .map((d) => `- https://github.com/${d.repo}/pull/${d.number}`)
                .join('\n');
              body =
                `${marker}\n` +
                `### 🔗 Cross-repo PR dependencies\n\n` +
                `This PR's CI was built together with the following dependent PR(s):\n\n` +
                `${list}\n\n` +
                `CI run: ${runUrl}`;
            } else if (status === 'failed') {
              // Dependencies were declared and valid, but could not be applied
              // (fetch/cherry-pick failed), so CI did not build the combined code.
              if (deps.length === 0) {
                core.info('status=failed but no valid dependencies after validation; skipping.');
                return;
              }
              const list = deps
                .map((d) => `- https://github.com/${d.repo}/pull/${d.number}`)
                .join('\n');
              // Map a structured error code (allow-list) to fixed copy; never
              // render untrusted free text from the artifact.
              const REASONS = {
                fetch_failed: 'the dependency PR could not be fetched (it may not exist)',
                no_common_base: 'no common base with the dependency PR',
                rev_list_failed: 'could not determine the dependency commits',
                cherry_pick_conflict: 'cherry-pick failed (if your PR has merge commits, rebase instead)',
                unsupported_repo: 'the dependency repository is not supported',
              };
              const code = typeof report.error_code === 'string' ? report.error_code : '';
              const reason = REASONS[code] ? `\n\nReason: ${REASONS[code]}` : '';
              body =
                `${marker}\n` +
                `### ❌ Cross-repo dependency could not be applied\n\n` +
                `The declared dependency PR(s) could not be merged into this ` +
                `build (fetch or cherry-pick failed), so CI did **not** run ` +
                `against the combined code:\n\n` +
                `${list}${reason}\n\n` +
                `CI run: ${runUrl}`;
            } else {
              // invalid: fixed copy only; never echo untrusted artifact text.
              const example = `depends-on: [${allow[0] || 'owner/repo'}/pull/<N> ` +
                `${allow[1] || 'owner/repo'}/pull/<M>]`;
              body =
                `${marker}\n` +
                `### ⚠️ \`depends-on\` could not be parsed\n\n` +
                `A \`depends-on:\` line was found in the PR description, but no ` +
                `valid dependency was parsed. Supported repositories: ` +
                `\`${allow.join('`, `')}\`; the PR id must be numeric.\n\n` +
                `Expected format:\n\n\`\`\`\n${example}\n\`\`\`\n\n` +
                `CI run: ${runUrl}`;
            }

            // --- upsert a single bot comment (identified by the marker) ---
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNum });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body });
              core.info(`Updated comment on PR #${prNum}.`);
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNum, body });
              core.info(`Created comment on PR #${prNum}.`);
            }
